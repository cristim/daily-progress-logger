name: DailyProgress
options:
  bundleIdPrefix: com.cristim
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  DailyProgress:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DailyProgress
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cristim.dailyprogress
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Daily Progress"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Go runtime requires libresolv for DNS; gomobile doesn't inject this automatically.
        OTHER_LDFLAGS: "-lresolv"
    dependencies:
      - framework: Frameworks/Core.xcframework
        embed: true
    preBuildScripts:
      - name: "Verify Core.xcframework"
        script: |
          if [ ! -d "${SRCROOT}/Frameworks/Core.xcframework" ]; then
            echo "error: Core.xcframework not found — run 'make ios-core' from the repo root." >&2
            exit 1
          fi
        basedOnDependencyAnalysis: false

  DailyProgressTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DailyProgressTests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.cristim.dailyprogress.tests
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - target: DailyProgress
      - framework: Frameworks/Core.xcframework
        embed: false
