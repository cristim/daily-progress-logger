name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 60

    env:
      CGO_CXXFLAGS: -std=c++20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Cache the Go build cache separately from the module cache that
      # setup-go handles. miqt cgo compilation takes 15+ min on a cold runner.
      - name: Cache Go build cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}-v1
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Install Qt
        run: brew install qt

      # Pinned to the version used locally; a version-skewed linter flags
      # different findings than the developer machine (brew ships latest).
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...

      - name: Lint
        run: golangci-lint run

      - name: Vulnerability check
        run: govulncheck ./...
